@startuml
start
:Incoming request;
if (Public path?) then (yes)
  :Continue request;
  stop
else (no)
  if (Session exists?) then (yes)
    :Continue request;
    stop
  else (no)
    if (API route?) then (yes)
      :Return 401 JSON;
      stop
    else (no)
      :Redirect to /login?callbackUrl=...;
      stop
    endif
  endif
endif
@enduml

