@startuml
left to right direction
skinparam componentStyle rectangle

rectangle "AUTH_* environment variables" as Env
component "auth.ts" as AuthTs
component "middleware.ts" as Middleware
component "app/api/auth/[...nextauth]/route.ts" as AuthRoute
component "components/auth/actions.ts" as Actions
component "app/login/page.tsx" as Login
component "app/(command)/layout.tsx" as Layout
component "components/sidebar.tsx" as Sidebar
component "app/api/* command APIs" as APIs

Env - -> AuthTs
AuthTs - -> Middleware
AuthTs - -> AuthRoute
AuthTs - -> Actions
AuthTs - -> Layout
Login - -> Actions
Sidebar - -> Actions
Middleware - -> APIs
@enduml

